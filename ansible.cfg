[defaults]
# Ansible configuration for this project

# Use UTF-8 encoding
force_valid_group_names = ignore
# Display skippable task results
display_skipped_hosts = false
# Show task timing
callbacks_enabled = profile_tasks, timer
# Enable fact caching
gathering = smart
# Python interpreter
interpreter_python = auto_silent
# SSH pipelining
pipelining = true
# Error handling
any_errors_fatal = true
# Retry pattern
retry_files_enabled = false
# Log path
log_path = ./ansible.log

[ssh_connection]
# SSH connection settings
pipelining = true
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
