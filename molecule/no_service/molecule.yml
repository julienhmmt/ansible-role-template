---
# molecule/no_service/molecule.yml
# Scénario léger sans systemd — utile pour tester install + configure
# sans avoir à démarrer un conteneur privilégié.
# Usage : molecule test -s no_service

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: debian13-nosystemd
    image: debian:trixie-slim
    pre_build_image: true
    command: sleep infinity
    env:
      DEBIAN_FRONTEND: noninteractive

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      stdout_callback: ansible.builtin.default
      result_format: yaml
      roles_path: ../
    connection:
      pipelining: true
  inventory:
    host_vars:
      debian13-nosystemd:
        ansible_python_interpreter: /usr/bin/python3

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint
