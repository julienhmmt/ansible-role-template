---
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false

driver:
  name: docker

platforms:
  - name: debian13-systemd
    image: molecule-debian13-systemd:latest
    # L'image est buildée depuis le Dockerfile local
    pre_build_image: false
    dockerfile: Dockerfile
    # Obligatoire pour systemd dans Docker
    privileged: false
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    capabilities:
      - SYS_ADMIN
    command: /sbin/init
    # Variables d'environnement pour indiquer à systemd qu'on est dans un conteneur
    env:
      container: docker
    # Laisser le temps à systemd de démarrer avant qu'Ansible connecte
    stop_signal: RTMIN+3

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: profile_tasks, timer
      stdout_callback: ansible.builtin.default
      result_format: yaml
      roles_path: ../
    connection:
      pipelining: true
  inventory:
    host_vars:
      debian13-systemd:
        ansible_python_interpreter: /usr/bin/python3

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint
