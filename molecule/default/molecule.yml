---
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false

driver:
  name: docker

platforms:
  - name: debian13-systemd
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: false
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    capabilities:
      - SYS_ADMIN
    command: /sbin/init
    env:
      container: docker
    stop_signal: RTMIN+3

  - name: ubuntu24-systemd
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: false
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    capabilities:
      - SYS_ADMIN
    command: /sbin/init
    env:
      container: docker
    stop_signal: RTMIN+3

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      callbacks_enabled: profile_tasks, timer
      stdout_callback: ansible.builtin.default
      result_format: yaml
      roles_path: ../
    connection:
      pipelining: true
  inventory:
    host_vars:
      debian13-systemd:
        ansible_python_interpreter: /usr/bin/python3
      ubuntu24-systemd:
        ansible_python_interpreter: /usr/bin/python3

verifier:
  name: ansible

lint: |
  set -e
  yamllint .
  ansible-lint
